name: Run tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install Poetry
        run: pipx install poetry
      - name: Install dependencies
        run: poetry install 
          
      - name: Run tests
        run: make run-tests
        env:
          DATABASE_URL: "dummy_database_url_for_tests"
          COPERNICUSMARINE_USERNAME: "fake_user_for_tests"
          COPERNICUSMARINE_PASSWORD: "fake_password_for_tests"

